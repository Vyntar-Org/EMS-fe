<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/assets/vyntar-logo-icon.jpeg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>:: Vyntar ::</title>

    <style>
      /* 1. Force the background to stay transparent/white on the input itself */
      input:-webkit-autofill,
      input:-webkit-autofill:hover,
      input:-webkit-autofill:focus,
      input:-webkit-autofill:active {
        -webkit-background-clip: text !important; /* Removes the background color entirely */
        -webkit-text-fill-color: #fff;
        box-shadow: inset 0 0 20px 20px transparent !important; /* Forces transparency */
        transition: background-color 5000000s ease-in-out 0s !important;
      }

      * {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Oxygen,
          Ubuntu,
          Cantarell,
          "Open Sans",
          "Helvetica Neue",
          sans-serif !important;
      }
      /* 2. Target the MUI Input wrapper which often holds the 'yellow' background */
      /* .MuiInputBase-root.Mui-focused,
        .MuiInputBase-root:hover,
        .MuiInputBase-root {
            background-color: transparent !important;
        } */

      /* 3. If you want a solid color (e.g., White) instead of transparency */
      .MuiAutocomplete-input:-webkit-autofill {
        -webkit-box-shadow: 0 0 0 1000px white inset !important;
        background-color: white !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
